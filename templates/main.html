
<!DOCTYPE html>
<html lang="uz" data-theme="dark">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Eco Life</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ===== ROOT ===== */

:root{
--bg:#0b0f1a;
--text:#e2e8f0;
--card:#161b2b;
--accent:#38bdf8;
}

body{
background:var(--bg);
color:var(--text);
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
scroll-behavior:smooth;
}

/* ===== NAVBAR ===== */

.navbar{
background:rgba(20,25,40,.65);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,.08);
padding:18px 0;
}

.navbar-brand{
font-size:1.5rem;
letter-spacing:.5px;
}

/* ===== HERO ===== */

.hero{
position:relative;
margin:40px auto;
max-width:1200px;
padding:150px 20px;
border-radius:22px;
text-align:center;
overflow:hidden;
color:white;
}

.hero-bg{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
animation:heroCarousel 20s infinite;
z-index:-2;
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(180deg,rgba(0,0,0,.35),rgba(0,0,0,.75));
z-index:-1;
}

@keyframes heroCarousel{
0%{background-image:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee")}
33%{background-image:url("https://images.unsplash.com/photo-1464822759023-fed622ff2c3b")}
66%{background-image:url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e")}
100%{background-image:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee")}
}

/* ===== HERO BUTTON ===== */

.hero-btn{
background:linear-gradient(45deg,#38bdf8,#22c55e);
border:none;
padding:14px 34px;
border-radius:40px;
color:white;
font-weight:600;
box-shadow:0 0 25px rgba(56,189,248,.4);
transition:.3s;
}

.hero-btn:hover{
transform:translateY(-3px);
box-shadow:0 15px 40px rgba(56,189,248,.7);
}

/* ===== VIDEO SECTION ===== */

.video-section{
position:relative;
height:700px;
overflow:hidden;
margin-top:60px;
}

.video-section video{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100%;
height:100%;
object-fit:cover;
}

.video-overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
}

/* ===== VIDEO CARDS ===== */

.video-features{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:1100px;
}

.video-card{
background:rgba(20,25,40,.65);
backdrop-filter:blur(12px);
border-radius:16px;
padding:24px;
text-align:center;
border:1px solid rgba(255,255,255,.08);
transition:.3s;
}

.video-card:hover{
transform:translateY(-6px);
box-shadow:0 15px 40px rgba(0,0,0,.5);
}

/* ===== PARALLAX ===== */

.parallax{
height:350px;
background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
background-size:cover;
background-position:center;
background-attachment:fixed;
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
font-weight:600;
color:white;
margin-top:80px;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
padding:40px;
opacity:.7;
}

/* ===== RESPONSIVE ===== */

@media(max-width:992px){

.video-section{
height:600px;
}

.hero{
padding:120px 20px;
}

}

@media(max-width:768px){

.video-features{
position:static;
transform:none;
margin-top:20px;
}

.video-section{
height:auto;
padding-bottom:40px;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">

<div class="container">

<a class="navbar-brand text-info fw-bold">

<i class="fas fa-leaf me-2"></i>

ECO LIFE

</a>

</div>

</nav>

<!-- HERO -->

<div class="hero">

<div class="hero-bg"></div>

<div class="hero-overlay"></div>

<div class="container">

<h1 class="display-3 fw-bold">Eco Life</h1>

<p class="lead">Tabiatni asrashni o'zingdan boshla</p>

<button class="hero-btn mt-3">Boshlash</button>

</div>

</div>

<!-- VIDEO -->

<div class="video-section">

<video autoplay muted loop playsinline>
<source src="/static/videos/eco_logo.mp4" type="video/mp4">
</video>

<div class="video-overlay"></div>

<div class="video-features">

<div class="row g-4">

<div class="col-md-4">
<div class="video-card">
<i class="fa-solid fa-tree fa-2x text-info mb-3"></i>
<h5>Ekologiya</h5>
<p>Tabiatni asrash va yashil muhit yaratish.</p>
</div>
</div>

<div class="col-md-4">
<div class="video-card">
<i class="fa-solid fa-recycle fa-2x text-info mb-3"></i>
<h5>Qayta ishlash</h5>
<p>Resurslardan samarali foydalanish.</p>
</div>
</div>

<div class="col-md-4">
<div class="video-card">
<i class="fa-solid fa-globe fa-2x text-info mb-3"></i>
<h5>Global ta'sir</h5>
<p>Kelajak uchun birgalikda harakat.</p>
</div>
</div>

</div>

</div>

</div>

<!-- PARALLAX -->

<div class="parallax">

Eco Life – Kelajak uchun

</div>

<footer>

© 2026 Eco Life Platform

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
