<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco System | Main</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-bg: #0b0f1a;
            --accent-blue: #38bdf8;
            --card-bg: #161b2b;
        }

        body {
            background-color: var(--dark-bg);
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Navbar */
        .navbar {
            background: rgba(11, 15, 26, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 0;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent-blue) !important;
        }

        /* Dropdown & Buttons */
        .dropdown-menu-dark {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px;
        }

        .dropdown-item {
            border-radius: 8px;
            margin-bottom: 2px;
            padding: 10px 15px;
        }

        .btn-auth {
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-login {
            color: #fff;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-register {
            background: var(--accent-blue);
            color: #000;
            border: none;
            margin-left: 10px;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* Carousel */
        .carousel-item {
            height: 75vh;
        }

        .carousel-item img {
            object-fit: cover;
            height: 100%;
            width: 100%;
            /* Rasmlar juda yorqin bo'lmasligi uchun filtr */
            filter: brightness(0.8);
        }

        .user-circle {
            width: 38px;
            height: 38px;
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--accent-blue);
        }

    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-globe-asia me-2"></i>ECO SYSTEM</a>
            
            <div class="ms-auto d-flex align-items-center">
                {% if user.is_authenticated %}
                    <div class="dropdown">
                        <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
                            <div class="user-circle">
                                <i class="fas fa-user-gear"></i>
                            </div>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark shadow">
                            <li><a class="dropdown-item" href="#"><i class="fas fa-cog me-2"></i> Settings</a></li>
                            <li><a class="dropdown-item" href="#"><i class="fas fa-user-circle me-2"></i> My Info</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#"><i class="fas fa-power-off me-2"></i> Logout</a></li>
                        </ul>
                    </div>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-auth btn-login text-decoration-none">Login</a>
                    <a href="{% url 'register' %}" class="btn btn-auth btn-register text-decoration-none">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div id="heroCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80" alt="Slide 1">
            </div>
            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?auto=format&fit=crop&w=1920&q=80" alt="Slide 2">
            </div>
            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80" alt="Slide 3">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div class="container my-5 py-5 text-center">
        <h1 class="fw-bold mb-4">Xush kelibsiz!</h1>
        <p class="text-secondary mx-auto" style="max-width: 700px;">
            Bu yerda loyihangizning asosiy mazmuni bo'ladi. Toza banner va tartibli navigatsiya foydalanuvchini chalg'itmaydi.
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
